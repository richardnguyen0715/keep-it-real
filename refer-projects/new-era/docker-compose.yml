services:
  app:
    build: .
    container_name: new-era-app
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - web

  nginx:
    image: nginx:alpine
    container_name: new-era-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - web

networks:
  web:
    driver: bridge
